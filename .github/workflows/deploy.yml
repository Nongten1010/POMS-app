name: Deploy POMS

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: poms-prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy changed app parts
    runs-on: [self-hosted, poms, windows, prod]
    timeout-minutes: 45

    defaults:
      run:
        shell: powershell

    env:
      FRONTEND_TARGET: C:\sites\poms
      BACKEND_TARGET: C:\apps\POMS-app\backend
      BACKEND_RELEASE: C:\apps\POMS-app\backend-release
      BACKEND_SERVICE: poms-app-backend
      BACKEND_HEALTH_URL: http://127.0.0.1:3000/health

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          clean: false

      - name: Trust runner workspace
        run: |
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"

      - name: Clean runner workspace except dependency installs
        run: |
          git reset --hard HEAD
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          git clean -ffdx -e backend/node_modules/ -e frontend/node_modules/
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Detect changed paths
        id: changes
        run: |
          $before = "${{ github.event.before }}"
          $after = "${{ github.sha }}"

          if ([string]::IsNullOrWhiteSpace($before) -or $before -match '^0+$') {
            $files = git ls-tree -r --name-only $after
          } elseif (git cat-file -e "$before^{commit}" 2>$null) {
            $files = git diff --name-only $before $after
          } elseif (git rev-parse --verify HEAD~1 2>$null) {
            Write-Host "Before commit $before is unavailable; falling back to HEAD~1..HEAD."
            $files = git diff --name-only HEAD~1 HEAD
          } else {
            Write-Host "No previous commit is available; treating the current tree as changed."
            $files = git ls-tree -r --name-only $after
          }

          $files | ForEach-Object { "Changed: $_" }

          $frontendChanged = $files | Where-Object { $_ -like 'frontend/*' }
          $backendChanged = $files | Where-Object { $_ -like 'backend/*' }
          $frontendDepsChanged = $files | Where-Object {
            $_ -eq 'frontend/package.json' -or $_ -eq 'frontend/package-lock.json'
          }
          $backendDepsChanged = $files | Where-Object {
            $_ -eq 'backend/package.json' -or $_ -eq 'backend/package-lock.json'
          }

          $frontend = if ($frontendChanged) { 'true' } else { 'false' }
          $backend = if ($backendChanged) { 'true' } else { 'false' }
          $frontendDeps = if ($frontendDepsChanged) { 'true' } else { 'false' }
          $backendDeps = if ($backendDepsChanged) { 'true' } else { 'false' }

          "frontend_changed=$frontend" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "backend_changed=$backend" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "frontend_deps_changed=$frontendDeps" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "backend_deps_changed=$backendDeps" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Update server git checkout
        if: steps.changes.outputs.frontend_changed == 'true' || steps.changes.outputs.backend_changed == 'true'
        run: |
          $repoRoot = Split-Path -Parent $env:BACKEND_TARGET
          $gitDir = Join-Path $repoRoot '.git'

          if (!(Test-Path $gitDir)) {
            throw "Server repo checkout was not found at $repoRoot"
          }

          Push-Location $repoRoot
          try {
            git fetch origin main
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            git checkout main
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            git pull --ff-only origin main
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            $current = git rev-parse HEAD
            if ($current -ne "${{ github.sha }}") {
              throw "Server checkout is at $current, expected ${{ github.sha }}"
            }

            Write-Host "Server git checkout updated to $current"
          } finally {
            Pop-Location
          }

      - name: Build frontend
        if: steps.changes.outputs.frontend_changed == 'true'
        working-directory: frontend
        timeout-minutes: 15
        run: |
          $sourceEnv = "C:\apps\POMS-app\frontend\.env.production"
          $workspaceEnv = ".env.production"

          if (!(Test-Path $sourceEnv)) {
            throw "Frontend .env.production was not found at $sourceEnv"
          }

          Copy-Item $sourceEnv $workspaceEnv -Force

          if ("${{ steps.changes.outputs.frontend_deps_changed }}" -eq 'true' -or !(Test-Path ".\node_modules")) {
            Write-Host "Installing frontend dependencies with npm ci."
            npm ci
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            Write-Host "Reusing existing frontend node_modules; package files did not change."
          }

          npm run build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Deploy frontend to IIS site root
        if: steps.changes.outputs.frontend_changed == 'true'
        run: |
          New-Item -ItemType Directory -Force -Path $env:FRONTEND_TARGET | Out-Null

          robocopy ".\frontend\dist" $env:FRONTEND_TARGET /MIR /R:3 /W:5 /NFL /NDL /NP
          $robocopyExit = $LASTEXITCODE

          if ($robocopyExit -gt 7) {
            throw "robocopy failed with exit code $robocopyExit"
          }

          $global:LASTEXITCODE = 0

          @(
            "sha=${{ github.sha }}"
            "ref=${{ github.ref_name }}"
            "run_id=${{ github.run_id }}"
            "run_number=${{ github.run_number }}"
            "deployed_at=$((Get-Date).ToUniversalTime().ToString('o'))"
          ) | Set-Content -Path (Join-Path $env:FRONTEND_TARGET 'DEPLOYED_SHA.txt') -Encoding utf8

      - name: Prepare backend environment
        if: steps.changes.outputs.backend_changed == 'true'
        run: |
          $sourceEnv = Join-Path $env:BACKEND_TARGET '.env'
          $workspaceEnv = '.\backend\.env'

          if (!(Test-Path $sourceEnv)) {
            throw "Backend .env was not found at $sourceEnv"
          }

          Copy-Item $sourceEnv $workspaceEnv -Force

      - name: Build and test backend
        if: steps.changes.outputs.backend_changed == 'true'
        working-directory: backend
        timeout-minutes: 20
        run: |
          if ("${{ steps.changes.outputs.backend_deps_changed }}" -eq 'true' -or !(Test-Path ".\node_modules")) {
            Write-Host "Installing backend dependencies with npm ci."
            npm ci
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          } else {
            Write-Host "Reusing existing backend node_modules; package files did not change."
          }

          npm run typecheck
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          npm test
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          npm run build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run backend database migrations
        if: steps.changes.outputs.backend_changed == 'true'
        working-directory: backend
        timeout-minutes: 5
        run: |
          npm run db:migrate
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Deploy backend service files
        if: steps.changes.outputs.backend_changed == 'true'
        timeout-minutes: 15
        run: |
          if (Test-Path $env:BACKEND_RELEASE) {
            Remove-Item $env:BACKEND_RELEASE -Recurse -Force
          }

          New-Item -ItemType Directory -Force -Path $env:BACKEND_RELEASE | Out-Null
          New-Item -ItemType Directory -Force -Path (Join-Path $env:BACKEND_RELEASE 'dist') | Out-Null

          Copy-Item ".\backend\package.json" $env:BACKEND_RELEASE -Force
          Copy-Item ".\backend\package-lock.json" $env:BACKEND_RELEASE -Force

          $targetNodeModules = Join-Path $env:BACKEND_TARGET 'node_modules'
          $installProductionDeps = "${{ steps.changes.outputs.backend_deps_changed }}" -eq 'true' -or !(Test-Path $targetNodeModules)

          if ($installProductionDeps) {
            Push-Location $env:BACKEND_RELEASE
            try {
              Write-Host "Installing backend production dependencies with npm ci --omit=dev."
              npm ci --omit=dev
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            } finally {
              Pop-Location
            }
          } else {
            Write-Host "Reusing existing backend production node_modules; package files did not change."
          }

          robocopy ".\backend\dist" (Join-Path $env:BACKEND_RELEASE 'dist') /MIR /R:3 /W:5 /NFL /NDL /NP
          $robocopyExit = $LASTEXITCODE

          if ($robocopyExit -gt 7) {
            throw "robocopy failed with exit code $robocopyExit"
          }

          $global:LASTEXITCODE = 0

          Stop-Service -Name $env:BACKEND_SERVICE -Force
          (Get-Service -Name $env:BACKEND_SERVICE).WaitForStatus('Stopped', '00:00:30')

          Copy-Item (Join-Path $env:BACKEND_RELEASE 'package.json') $env:BACKEND_TARGET -Force
          Copy-Item (Join-Path $env:BACKEND_RELEASE 'package-lock.json') $env:BACKEND_TARGET -Force

          if ($installProductionDeps) {
            robocopy (Join-Path $env:BACKEND_RELEASE 'node_modules') (Join-Path $env:BACKEND_TARGET 'node_modules') /MIR /R:3 /W:5 /NFL /NDL /NP
            $robocopyExit = $LASTEXITCODE

            if ($robocopyExit -gt 7) {
              throw "robocopy node_modules failed with exit code $robocopyExit"
            }

            $global:LASTEXITCODE = 0
          }

          robocopy (Join-Path $env:BACKEND_RELEASE 'dist') (Join-Path $env:BACKEND_TARGET 'dist') /MIR /R:3 /W:5 /NFL /NDL /NP
          $robocopyExit = $LASTEXITCODE

          if ($robocopyExit -gt 7) {
            throw "robocopy dist failed with exit code $robocopyExit"
          }

          $global:LASTEXITCODE = 0

      - name: Restart backend and verify health
        if: steps.changes.outputs.backend_changed == 'true'
        run: |
          Start-Service -Name $env:BACKEND_SERVICE

          $deadline = (Get-Date).AddSeconds(60)
          do {
            try {
              $response = Invoke-WebRequest $env:BACKEND_HEALTH_URL -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                Write-Host "Backend health check passed: $($response.Content)"
                exit 0
              }
            } catch {
              Write-Host "Waiting for backend health check: $($_.Exception.Message)"
            }

            Start-Sleep -Seconds 2
          } while ((Get-Date) -lt $deadline)

          throw "Backend health check did not pass within 60 seconds."

      - name: Write backend deploy marker
        if: steps.changes.outputs.backend_changed == 'true'
        run: |
          @(
            "sha=${{ github.sha }}"
            "ref=${{ github.ref_name }}"
            "run_id=${{ github.run_id }}"
            "run_number=${{ github.run_number }}"
            "deployed_at=$((Get-Date).ToUniversalTime().ToString('o'))"
          ) | Set-Content -Path (Join-Path $env:BACKEND_TARGET 'DEPLOYED_SHA.txt') -Encoding utf8

      - name: Ensure backend service is running
        if: always() && steps.changes.outputs.backend_changed == 'true'
        run: |
          $service = Get-Service -Name $env:BACKEND_SERVICE
          if ($service.Status -ne 'Running') {
            Start-Service -Name $env:BACKEND_SERVICE
          }

      - name: Remove backend environment copy
        if: always() && steps.changes.outputs.backend_changed == 'true'
        run: |
          Remove-Item ".\backend\.env" -Force -ErrorAction SilentlyContinue

      - name: Report skipped deploy
        if: steps.changes.outputs.frontend_changed != 'true' && steps.changes.outputs.backend_changed != 'true'
        run: |
          Write-Host "No frontend/ or backend/ changes detected. Nothing to deploy."
